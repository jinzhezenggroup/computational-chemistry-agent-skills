name: Sync Jobs (pure git)

on:
  push:
    branches:
      - master
    paths:
      - 'sync.toml'
      - 'scripts/sync_jobs.py'
      - '.github/workflows/sync-jobs.yml'
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Optional job name in sync.toml. Empty = all enabled jobs'
        required: false
        type: string
      rev:
        description: 'Optional upstream ref/tag/SHA override'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-jobs-pure-git
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout destination repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git identity
        run: |
          git config user.name "GitHub Actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create/update sync branch
        run: |
          set -euo pipefail
          git checkout -B sync/auto

      - name: Run sync script
        env:
          INPUT_JOB: ${{ github.event.inputs.job || '' }}
          INPUT_REV: ${{ github.event.inputs.rev || '' }}
        run: |
          set -euo pipefail
          ARGS=""
          if [ -n "${INPUT_JOB}" ]; then
            ARGS="$ARGS --job ${INPUT_JOB}"
          fi
          if [ -n "${INPUT_REV}" ]; then
            ARGS="$ARGS --rev ${INPUT_REV}"
          fi
          python3 scripts/sync_jobs.py $ARGS

      - name: Push sync branch
        id: push
        run: |
          set -euo pipefail
          if [ -z "$(git log origin/sync/auto..HEAD --oneline 2>/dev/null || true)" ]; then
            if git ls-remote --heads origin sync/auto | grep -q sync/auto; then
              if [ -z "$(git log HEAD..origin/sync/auto --oneline)" ] && [ -z "$(git log origin/sync/auto..HEAD --oneline)" ]; then
                echo "changed=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            else
              if [ -z "$(git log origin/master..HEAD --oneline)" ]; then
                echo "changed=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
          fi
          git push -f origin sync/auto
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update PR
        if: steps.push.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          existing=$(gh pr list --base master --head sync/auto --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "PR already open: #$existing"
            gh pr edit "$existing" --title "chore(sync): update synced directories" --body "Automated pure-git sync updates from upstream repositories."
          else
            gh pr create \
              --base master \
              --head sync/auto \
              --title "chore(sync): update synced directories" \
              --body "Automated pure-git sync updates from upstream repositories."
          fi

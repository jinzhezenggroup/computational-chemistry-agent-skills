name: Build Skills Site

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate site data
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml
          python3 scripts/generate_site_data.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install
        working-directory: site
        run: |
          set -euo pipefail
          npm ci

      - name: Build
        working-directory: site
        env:
          # Optional; set in repo/environment vars if you want canonical URLs.
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          set -euo pipefail
          npm run build

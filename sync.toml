# Declarative sync jobs for Copybara workflow
# Add more [[jobs]] blocks to extend.

version = 1

[[jobs]]
name = "dpdisp-run"
enabled = true
upstream_repo = "deepmodeling/dpdispatcher"
source_path = "skills/dpdisp-run"
target_path = "tools/dpdisp-run"
tag_regex = "^v.*"
destination_branch = "main"

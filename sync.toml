# Git-based sync jobs
#
# Each job describes an upstream repo + directory to import into this repo.
# The workflow will:
# - detect jobs to run
# - for each job, find new upstream commits since last recorded commit
# - re-apply them into this repo (directory-only) and commit
#
# Notes:
# - `upstream_ref` can be a branch (e.g. "master") or a tag (e.g. "v0.9.0").
# - `path` is the directory in the upstream repo to import.
# - `dest` is the directory in THIS repo where the content lands.

version = 1

[[jobs]]
name = "dpdisp-submit"
enabled = true
upstream_repo = "deepmodeling/dpdispatcher"
upstream_ref = "master"
path = "skills/dpdisp-submit"
dest = "skills/tools/dpdisp-submit"

[[jobs]]
name = "dpdata-cli"
enabled = true
upstream_repo = "deepmodeling/dpdata"
upstream_ref = "master"
path = "skills/dpdata-cli"
dest = "skills/tools/dpdata-cli"

[[jobs]]
name = "dpdata-driver"
enabled = true
upstream_repo = "deepmodeling/dpdata"
upstream_ref = "master"
path = "skills/dpdata-driver"
dest = "skills/tools/dpdata-driver"

[[jobs]]
name = "dpdata-minimizer"
enabled = true
upstream_repo = "deepmodeling/dpdata"
upstream_ref = "master"
path = "skills/dpdata-minimizer"
dest = "skills/tools/dpdata-minimizer"

[[jobs]]
name = "create-skill"
enabled = true
upstream_repo = "njzjz/create-skill-agent-skill"
upstream_ref = "master"
path = "skills/create-skill"
dest = ".github/skills/create-skill"
